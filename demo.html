<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get a Demo - Professional Solutions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f9fafb 0%, #e2e8f0 100%);
            min-height: 100vh;
            animation: backgroundShift 15s ease-in-out infinite;
        }

        @keyframes backgroundShift {

            0%,
            100% {
                background: linear-gradient(135deg, #f9fafb 0%, #e2e8f0 100%);
            }

            50% {
                background: linear-gradient(135deg, #e2e8f0 0%, #f1f5f9 100%);
            }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            margin-top: 6rem;
        }

        @keyframes gridMove {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(10px, 10px);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-section {
            background: white;
            border-radius: 16px;
            padding: 3rem;
            margin-top: -2rem;
            position: relative;
            z-index: 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            opacity: 0;
            animation: slideInUp 1s ease-out 0.6s forwards;
        }

        .required-note {
            text-align: right;
            color: #6b7280;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .form-group {
            position: relative;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #fafafa;
            font-family: inherit;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: #1e3a8a;
            background: white;
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
            transform: translateY(-2px);
        }

        .form-input:hover,
        .form-select:hover,
        .form-textarea:hover {
            border-color: #6366f1;
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }

        .char-count {
            position: absolute;
            bottom: 0.5rem;
            right: 1rem;
            font-size: 0.8rem;
            color: #6b7280;
        }

        .checkbox-group {
            margin: 2rem 0;
        }

        .checkbox-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            margin-bottom: 1rem;
            padding: 1rem;
            background: #f9fafb;
            border-radius: 8px;
            transition: background 0.3s ease;
        }

        .checkbox-item:hover {
            background: #f3f4f6;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #d1d5db;
            border-radius: 4px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .checkbox.checked {
            background: #10b981;
            border-color: #10b981;
        }

        .checkbox.checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .checkbox-label {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #374151;
            cursor: pointer;
        }

        .checkbox-label a {
            color: #1e3a8a;
            text-decoration: none;
            font-weight: 600;
        }

        .checkbox-label a:hover {
            color: #6366f1;
            text-decoration: underline;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #1e3a8a 0%, #3730a3 100%);
            color: white;
            border: none;
            padding: 1.2rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.6s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(30, 58, 138, 0.3);
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5rem;
            }

            .form-section {
                padding: 2rem 1.5rem;
                margin: 1rem;
                margin-top: -2rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .container {
                padding: 1rem;
            }
        }

        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .floating-circle {
            position: absolute;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
        }

        .floating-circle:nth-child(1) {
            width: 80px;
            height: 80px;
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }

        .floating-circle:nth-child(2) {
            width: 120px;
            height: 120px;
            top: 60%;
            right: 15%;
            animation-delay: 2s;
        }

        .floating-circle:nth-child(3) {
            width: 60px;
            height: 60px;
            top: 80%;
            left: 70%;
            animation-delay: 4s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.3;
            }

            50% {
                transform: translateY(-20px) rotate(180deg);
                opacity: 0.6;
            }
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div id="header-container"></div>

    <div class="floating-elements">
        <div class="floating-circle"></div>
        <div class="floating-circle"></div>
        <div class="floating-circle"></div>
    </div>

    <div class="container">
        <div class="form-section">
            <div class="required-note">*Indicates required fields</div>

            <form id="demoForm">
                <div class="form-grid">
                    <div class="form-group">
                        <input type="email" class="form-input" placeholder="Professional Email*" required>
                    </div>
                    <div class="form-group">
                        <input type="text" class="form-input" placeholder="First Name*" required>
                    </div>
                    <div class="form-group">
                        <input type="text" class="form-input" placeholder="Last Name*" required>
                    </div>
                    <div class="form-group">
                        <input type="text" class="form-input" placeholder="Company*" required>
                    </div>
                    <div class="form-group">
                        <select class="form-select" required>
                            <option value="">Country or Area*</option>
                            <option value="us">United States</option>
                            <option value="uk">United Kingdom</option>
                            <option value="de">Germany</option>
                            <option value="fr">France</option>
                            <option value="jp">Japan</option>
                            <option value="in">India</option>
                            <option value="cn">China</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <select class="form-select" required>
                            <option value="">Industry*</option>
                            <option value="automotive">Automotive</option>
                            <option value="aerospace">Aerospace & Defense</option>
                            <option value="manufacturing">Manufacturing</option>
                            <option value="healthcare">Healthcare</option>
                            <option value="energy">Energy & Utilities</option>
                            <option value="architecture">Architecture & Construction</option>
                            <option value="consumer">Consumer Goods</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <select class="form-select" required>
                            <option value="">Domain of Interest*</option>
                            <option value="design">3D Design & Modeling</option>
                            <option value="simulation">Simulation & Analysis</option>
                            <option value="manufacturing">Manufacturing Operations</option>
                            <option value="collaboration">Collaboration & Data Management</option>
                            <option value="governance">Governance & Compliance</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <input type="text" class="form-input" placeholder="Phone Number">
                    </div>
                </div>

                <div class="form-group full-width">
                    <div style="position: relative;">
                        <textarea class="form-textarea" placeholder="Comments*
Tell us your message here" maxlength="800" id="comments" required></textarea>
                        <div class="char-count">
                            <span id="charCount">0</span>/800
                        </div>
                    </div>
                </div>

                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <div class="checkbox" id="checkbox1"></div>
                        <label class="checkbox-label" for="checkbox1">
                            I agree to Systems' <a href="#">Terms of Use</a> and <a href="#">Privacy Policy</a> and I am
                            informed that my personal data may be shared with trusted stakeholders for business
                            purposes, including <a href="#">Systems</a> and <a href="#">SOLIDWORKS</a> business partners
                            and events sponsors.*
                        </label>
                    </div>
                    <div class="checkbox-item">
                        <div class="checkbox" id="checkbox2"></div>
                        <label class="checkbox-label" for="checkbox2">
                            I agree to receive marketing communications about Systems Products or Services.
                        </label>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Submit</button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <div id="footer-container"></div>

    <script src="js/script.js"></script>

    <script>
        // Character counter
        const textarea = document.getElementById('comments');
        const charCount = document.getElementById('charCount');

        textarea.addEventListener('input', function () {
            charCount.textContent = this.value.length;
        });

        // Custom checkbox functionality
        const checkboxes = document.querySelectorAll('.checkbox');

        checkboxes.forEach(checkbox => {
            checkbox.addEventListener('click', function () {
                this.classList.toggle('checked');
            });
        });

        // Form submission
        document.getElementById('demoForm').addEventListener('submit', function (e) {
            e.preventDefault();

            // Check if required checkbox is checked
            const requiredCheckbox = document.getElementById('checkbox1');
            if (!requiredCheckbox.classList.contains('checked')) {
                alert('Please agree to the Terms of Use and Privacy Policy to continue.');
                return;
            }

            // Animate submit button
            const submitBtn = this.querySelector('.submit-btn');
            submitBtn.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';
            submitBtn.textContent = 'Submitting...';

            setTimeout(() => {
                submitBtn.textContent = 'Thank you! Redirecting to portfolio...';
                setTimeout(() => {
                    window.location.href = 'https://portfolio-mindfultalkins-projects.vercel.app/';
                }, 2000);
            }, 2000);
        });

        // Add smooth scroll animations for form inputs
        const inputs = document.querySelectorAll('.form-input, .form-select, .form-textarea');

        inputs.forEach((input, index) => {
            input.style.opacity = '0';
            input.style.transform = 'translateY(20px)';

            setTimeout(() => {
                input.style.transition = 'all 0.6s ease';
                input.style.opacity = '1';
                input.style.transform = 'translateY(0)';
            }, 800 + (index * 100));
        });
    </script>
</body>

</html>
