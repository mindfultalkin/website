<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get a Demo - Professional Solutions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f9fafb 0%, #e2e8f0 100%);
            min-height: 100vh;
            animation: backgroundShift 20s ease-in-out infinite;
            position: relative;
            overflow-x: hidden;
        }

        @keyframes backgroundShift {

            0%,
            100% {
                background: linear-gradient(135deg, #f9fafb 0%, #e2e8f0 100%);
            }

            25% {
                background: linear-gradient(135deg, #e2e8f0 0%, #f1f5f9 100%);
            }

            50% {
                background: linear-gradient(135deg, #f1f5f9 0%, #f8fafc 100%);
            }

            75% {
                background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 10;
            margin-top: 6rem
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: clamp(2rem, 5vw, 4rem);
            position: relative;
            box-shadow:
                0 32px 64px -12px rgba(0, 0, 0, 0.12),
                0 0 0 1px rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(226, 232, 240, 0.3);
            opacity: 0;
            animation: slideInUp 1s ease-out 0.8s forwards;
            transition: all 0.3s ease;
        }

        .form-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.02) 0%, rgba(30, 58, 138, 0.02) 100%);
            border-radius: 24px;
            pointer-events: none;
        }

        .form-section:hover {
            transform: translateY(-2px);
            box-shadow:
                0 40px 80px -12px rgba(0, 0, 0, 0.15),
                0 0 0 1px rgba(255, 255, 255, 0.9);
        }

        .form-heading {
            font-size: clamp(1.5rem, 1.6vw, 2.2rem);
            font-weight: 700;
            color: #1e3a8a;
            text-align: center;
            margin-bottom: 1rem;
            line-height: 1.3;
            position: relative;
        }

        .required-note {
            text-align: right;
            color: #6b7280;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            font-style: italic;
        }

        .form-column {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .form-group {
            position: relative;
            opacity: 0;
            transform: translateY(20px);
            animation: formInputSlide 0.6s ease-out forwards;
        }

        .form-group:nth-child(1) {
            animation-delay: 1.2s;
        }

        .form-group:nth-child(2) {
            animation-delay: 1.3s;
        }

        .form-group:nth-child(3) {
            animation-delay: 1.4s;
        }

        .form-group:nth-child(4) {
            animation-delay: 1.5s;
        }

        .form-group:nth-child(5) {
            animation-delay: 1.6s;
        }

        .form-group:nth-child(6) {
            animation-delay: 1.7s;
        }

        .form-group:nth-child(7) {
            animation-delay: 1.8s;
        }

        .form-group:nth-child(8) {
            animation-delay: 1.9s;
        }

        @keyframes formInputSlide {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.8);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            position: relative;
        }

        .form-input:focus,
        .form-select:focus {
            border-color: #6366f1;
            background: rgba(255, 255, 255, 1);
            box-shadow:
                0 0 0 4px rgba(99, 102, 241, 0.1),
                0 4px 12px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .form-input::placeholder {
            color: #94a3b8;
            transition: all 0.3s ease;
        }

        .form-input:focus::placeholder {
            color: #cbd5e1;
            transform: translateY(-2px);
        }

        .checkbox-group {
            margin: 2.5rem 0;
            opacity: 0;
            animation: slideInUp 0.6s ease-out 2s forwards;
        }

        .checkbox-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding: 1.5rem;
            background: rgba(249, 250, 251, 0.8);
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(226, 232, 240, 0.5);
            position: relative;
            overflow: hidden;
        }

        .checkbox-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.05), transparent);
            transition: left 0.6s ease;
        }

        .checkbox-item:hover {
            background: rgba(243, 244, 246, 0.9);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }

        .checkbox-item:hover::before {
            left: 100%;
        }

        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #d1d5db;
            border-radius: 6px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
            margin-top: 2px;
            background: white;
        }

        .checkbox:hover {
            border-color: #6366f1;
            transform: scale(1.05);
        }

        .checkbox.checked {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-color: #10b981;
            transform: scale(1.1);
        }

        .checkbox.checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            color: white;
            font-size: 14px;
            font-weight: bold;
            animation: checkmarkPop 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        @keyframes checkmarkPop {
            to {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .checkbox-label {
            font-size: 1rem;
            line-height: 1.6;
            color: #374151;
            cursor: pointer;
        }

        .checkbox-label a {
            color: #1e3a8a;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .checkbox-label a:hover {
            color: #6366f1;
            text-decoration: underline;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #1e3a8a 0%, #3730a3 50%, #6366f1 100%);
            color: white;
            border: none;
            padding: 1.5rem 2rem;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(30, 58, 138, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0;
            animation: slideInUp 0.6s ease-out 2.2s forwards;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.8s ease;
        }

        .submit-btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 16px 48px rgba(30, 58, 138, 0.4);
            background: linear-gradient(135deg, #1e40af 0%, #3730a3 50%, #6366f1 100%);
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:active {
            transform: translateY(-2px) scale(1.01);
        }

        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .floating-circle {
            position: absolute;
            border-radius: 50%;
            animation: float 12s ease-in-out infinite;
            filter: blur(1px);
        }

        .floating-circle:nth-child(1) {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(99, 102, 241, 0.05) 70%);
            top: 15%;
            left: 8%;
            animation-delay: 0s;
        }

        .floating-circle:nth-child(2) {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(30, 58, 138, 0.12) 0%, rgba(30, 58, 138, 0.03) 70%);
            top: 60%;
            right: 10%;
            animation-delay: 4s;
        }

        .floating-circle:nth-child(3) {
            width: 90px;
            height: 90px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.1) 0%, rgba(16, 185, 129, 0.02) 70%);
            top: 80%;
            left: 70%;
            animation-delay: 8s;
        }

        .floating-circle:nth-child(4) {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, rgba(55, 48, 163, 0.08) 0%, rgba(55, 48, 163, 0.02) 70%);
            top: 30%;
            right: 30%;
            animation-delay: 2s;
        }

        .floating-circle:nth-child(5) {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, rgba(99, 102, 241, 0.03) 70%);
            top: 10%;
            right: 60%;
            animation-delay: 6s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 0.6;
            }

            25% {
                transform: translateY(-30px) rotate(90deg) scale(1.1);
                opacity: 0.8;
            }

            50% {
                transform: translateY(-60px) rotate(180deg) scale(0.9);
                opacity: 1;
            }

            75% {
                transform: translateY(-30px) rotate(270deg) scale(1.05);
                opacity: 0.7;
            }
        }

        /* Mobile Optimizations */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .hero-section {
                padding: 2rem 0 1rem;
            }

            .form-section {
                padding: 2rem 1.5rem;
                border-radius: 20px;
                margin: 0 0.5rem;
            }

            .form-column {
                grid-template-columns: 1fr;
                gap: 1.25rem;
            }

            .form-input,
            .form-select {
                padding: 1.25rem 1rem;
                font-size: 16px;
                /* Prevents zoom on iOS */
            }

            .checkbox-item {
                padding: 1.25rem;
                border-radius: 12px;
            }

            .submit-btn {
                padding: 1.25rem 2rem;
                font-size: 1.1rem;
                border-radius: 12px;
            }

            .floating-circle {
                opacity: 0.5;
            }

            .floating-circle:nth-child(1) {
                width: 80px;
                height: 80px;
            }

            .floating-circle:nth-child(2) {
                width: 120px;
                height: 120px;
            }

            .floating-circle:nth-child(3) {
                width: 60px;
                height: 60px;
            }
        }

        @media (max-width: 480px) {
            .hero-title {
                font-size: 2.2rem;
            }

            .form-section {
                padding: 1.5rem 1rem;
                margin: 0;
            }

            .form-input,
            .form-select {
                padding: 1rem 0.875rem;
            }

            .checkbox-item {
                padding: 1rem;
            }

            .submit-btn {
                padding: 1rem 1.5rem;
                font-size: 1rem;
            }
        }

        /* High-performance animations */
        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            }

            .form-section {
                background: rgba(30, 41, 59, 0.95);
                color: #f1f5f9;
            }

            .form-input,
            .form-select {
                background: rgba(51, 65, 85, 0.8);
                border-color: #475569;
                color: #f1f5f9;
            }

            .checkbox-item {
                background: rgba(51, 65, 85, 0.5);
            }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <div id="header-container"></div>

    <div class="floating-elements">
        <div class="floating-circle"></div>
        <div class="floating-circle"></div>
        <div class="floating-circle"></div>
        <div class="floating-circle"></div>
        <div class="floating-circle"></div>
    </div>

    <div class="container">
        
        <div class="form-section">
            <h2 class="form-heading">We would like to know you before we share the samples with you.</h2>
            <div class="required-note">*Indicates required fields</div>

            <form id="demoForm">
                <div class="form-column">
                    <div class="form-group">
                        <input type="email" class="form-input" placeholder="Professional Email*" required>
                    </div>
                    <div class="form-group">
                        <input type="text" class="form-input" placeholder="First Name*" required>
                    </div>
                    <div class="form-group">
                        <input type="text" class="form-input" placeholder="Last Name*" required>
                    </div>
                    <div class="form-group">
                        <input type="text" class="form-input" placeholder="Company*" required>
                    </div>
                    <div class="form-group">
                        <select class="form-select" required>
                            <option value="">Country*</option>
                            <option value="us">United States</option>
                            <option value="uk">United Kingdom</option>
                            <option value="de">Germany</option>
                            <option value="fr">France</option>
                            <option value="jp">Japan</option>
                            <option value="in">India</option>
                            <option value="cn">China</option>
                            <option value="au">Australia</option>
                            <option value="ca">Canada</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <select class="form-select" required>
                            <option value="">Industry*</option>
                            <option value="automotive">Automotive</option>
                            <option value="aerospace">Aerospace & Defense</option>
                            <option value="manufacturing">Manufacturing</option>
                            <option value="healthcare">Healthcare</option>
                            <option value="energy">Energy & Utilities</option>
                            <option value="architecture">Architecture & Construction</option>
                            <option value="consumer">Consumer Goods</option>
                            <option value="technology">Technology</option>
                            <option value="finance">Financial Services</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <select class="form-select" required>
                            <option value="">Interested In*</option>
                            <option value="knowledge">Knowledge Base Solutions</option>
                            <option value="manual">User Manual & Guides</option>
                            <option value="training">Training Documents</option>
                            <option value="communication">Business Communication Training</option>
                            <option value="all">All of the Above</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <input type="tel" class="form-input" placeholder="Phone Number (Optional)">
                    </div>
                </div>

                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <div class="checkbox" id="checkbox1"></div>
                        <label class="checkbox-label" for="checkbox1">
                            I agree to receive marketing communications about our products and services. You can
                            unsubscribe at any time.
                        </label>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Get My Demo</button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <div id="footer-container"></div>

    <script src="js/components.js"></script>

    <script>
        // Enhanced checkbox functionality with smooth animations
        const checkboxes = document.querySelectorAll('.checkbox');

        checkboxes.forEach(checkbox => {
            checkbox.addEventListener('click', function () {
                this.classList.toggle('checked');

                // Add ripple effect
                const ripple = document.createElement('span');
                ripple.style.position = 'absolute';
                ripple.style.width = '20px';
                ripple.style.height = '20px';
                ripple.style.background = 'rgba(99, 102, 241, 0.3)';
                ripple.style.borderRadius = '50%';
                ripple.style.transform = 'scale(0)';
                ripple.style.animation = 'ripple 0.6s linear';
                ripple.style.pointerEvents = 'none';

                this.appendChild(ripple);

                setTimeout(() => {
                    ripple.remove();
                }, 600);
            });
        });

        // Add ripple animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                to {
                    transform: scale(2);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // Enhanced form submission with better UX
        document.getElementById('demoForm').addEventListener('submit', function (e) {
            e.preventDefault();

            // Validate form
            const requiredFields = this.querySelectorAll('[required]');
            let isValid = true;

            requiredFields.forEach(field => {
                if (!field.value.trim()) {
                    isValid = false;
                    field.style.borderColor = '#ef4444';
                    field.style.animation = 'shake 0.5s ease-in-out';

                    setTimeout(() => {
                        field.style.borderColor = '#e2e8f0';
                        field.style.animation = '';
                    }, 2000);
                }
            });

            if (!isValid) {
                // Scroll to first invalid field
                const firstInvalid = this.querySelector('[required]:invalid, [required][value=""]');
                if (firstInvalid) {
                    firstInvalid.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    firstInvalid.focus();
                }
                return;
            }

            // Animate submit button
            const submitBtn = this.querySelector('.submit-btn');
            const originalText = submitBtn.textContent;

            submitBtn.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';
            submitBtn.innerHTML = `
                <span style="display: inline-flex; align-items: center; gap: 0.5rem;">
                    <span style="width: 20px; height: 20px; border: 2px solid white; border-top: 2px solid transparent; border-radius: 50%; animation: spin 1s linear infinite;"></span>
                    Submitting...
                </span>
            `;
            submitBtn.disabled = true;

            // Add loading animation
            const loadingStyle = document.createElement('style');
            loadingStyle.textContent = `
                @keyframes spin {
                    0% { transform: rotate(0deg); }
                    100% { transform: rotate(360deg); }
                }
                @keyframes shake {
                    0%, 100% { transform: translateX(0); }
                    25% { transform: translateX(-5px); }
                    75% { transform: translateX(5px); }
                }
            `;
            document.head.appendChild(loadingStyle);

            setTimeout(() => {
                submitBtn.innerHTML = `
                    <span style="display: inline-flex; align-items: center; gap: 0.5rem;">
                        <span style="font-size: 1.2rem;">✓</span>
                        Success! Redirecting...
                    </span>
                `;

                setTimeout(() => {
                    window.location.href = 'portfolio/portfolio.html';
                }, 1500);
            }, 2000);
        });

        // Enhanced input animations and interactions
        const inputs = document.querySelectorAll('.form-input, .form-select');

        inputs.forEach(input => {
            // Add focus/blur animations
            input.addEventListener('focus', function () {
                this.parentElement.style.transform = 'scale(1.02)';
                this.parentElement.style.zIndex = '10';
            });

            input.addEventListener('blur', function () {
                this.parentElement.style.transform = 'scale(1)';
                this.parentElement.style.zIndex = '1';
            });

            // Add typing animation for text inputs
            if (input.type === 'text' || input.type === 'email' || input.type === 'tel') {
                input.addEventListener('input', function () {
                    if (this.value) {
                        this.style.background = 'rgba(99, 102, 241, 0.05)';
                    } else {
                        this.style.background = 'rgba(255, 255, 255, 0.8)';
                    }
                });
            }
        });

        // Parallax effect for floating elements
        let mouseX = 0;
        let mouseY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX / window.innerWidth - 0.5;
            mouseY = e.clientY / window.innerHeight - 0.5;
        });

        function updateParallax() {
            const circles = document.querySelectorAll('.floating-circle');
            circles.forEach((circle, index) => {
                const speed = (index + 1) * 0.5;
                const x = mouseX * speed * 20;
                const y = mouseY * speed * 20;
                circle.style.transform = `translate(${x}px, ${y}px)`;
            });
            requestAnimationFrame(updateParallax);
        }

        updateParallax();

        // Add smooth scrolling for better UX
        document.documentElement.style.scrollBehavior = 'smooth';

        // Performance optimization: Pause animations when not visible
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.animationPlayState = 'running';
                } else {
                    entry.target.style.animationPlayState = 'paused';
                }
            });
        });

        document.querySelectorAll('.floating-circle').forEach(circle => {
            observer.observe(circle);
        });
    </script>
</body>

</html>
